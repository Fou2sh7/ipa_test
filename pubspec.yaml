name: mediconsult
description: "تطبيق MediConsult للتأمين الصحي - نظام شامل لإدارة الخدمات الطبية"
publish_to: 'none' # منع النشر العام للحزمة

# معلومات التطبيق
homepage: https://mediconsult.com
version: 1.0.1+8

environment:
  sdk: ^3.9.2
  flutter: ">=3.24.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # Core UI & Navigation
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  go_router: ^16.2.4
  animated_bottom_navigation_bar: ^1.0.2
  flutter_native_splash: ^2.4.6
  
  # State Management & Architecture
  flutter_bloc: ^9.1.1
  get_it: ^8.2.0
  equatable: ^2.0.7
  
  # Data & Serialization
  json_annotation: ^4.9.0
  json_serializable: ^6.11.1
  freezed_annotation: ^3.1.0
  freezed: ^3.2.3
  retrofit:
  
  # Storage & Caching
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  
  # Firebase Services
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.3
  firebase_crashlytics: ^5.0.4
  
  # Location & Maps
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  
  # Media & Permissions
  image_picker: ^1.2.0
  permission_handler: ^12.0.1
  
  # UI Components & Utils
  pinput: ^3.0.1
  shimmer: ^3.0.0
  showcaseview: ^5.0.1
  flutter_html: ^3.0.0
  flutter_local_notifications: ^19.5.0
  
  # Networking & Connectivity
  connectivity_plus: ^6.1.0
  pretty_dio_logger: ^1.4.0
  url_launcher: ^6.3.1
  
  # Localization
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Build tools
  build_runner:
  retrofit_generator:
  # Testing tools
  mockito: ^5.5.0
  bloc_test: ^10.0.0
  integration_test:
    sdk: flutter

  # Linting tools
  flutter_lints: ^5.0.0

dependency_overrides:
  intl: ^0.18.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/logo/
    - assets/onboarding/
    - assets/signup/
    - assets/fonts/
    - assets/login/
    - assets/home/
    - assets/bottomnavbar/
    - assets/approval/
    - assets/refund/
    - assets/chronic/
    - assets/profile/
    - assets/familymem/
    - assets/contact/
    - assets/network/
    - assets/translations/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500

    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500