name: iOS IPA Build & Release

on:
  workflow_dispatch: # لتشغيله يدويًا من GitHub

jobs:
  build-ios:
    runs-on: macos-latest
    name: Build & Release iOS IPA

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3

      # 2️⃣ Install Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      # 3️⃣ Get dependencies
      - run: flutter pub get

      # 4️⃣ Install FlutterFire CLI
      - name: Install FlutterFire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      # 5️⃣ Update CocoaPods
      - run: pod repo update
        working-directory: ios

      # 6️⃣ Build iOS IPA
      - run: flutter build ios --release --no-codesign

      # 7️⃣ Prepare Payload folder
      - run: mkdir Payload
        working-directory: build/ios/iphoneos

      - run: mv Runner.app Payload
        working-directory: build/ios/iphoneos

      # 8️⃣ Zip IPA
      - name: Zip IPA
        run: zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      # 9️⃣ Create Auto Tag
      - name: Create Auto Tag
        id: create_tag
        run: |
          TAG="v1.${{ github.run_number }}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      # 🔟 Upload to GitHub Release
      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.PAT_TOKEN }}  # استخدم PAT اللي عندك
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: ${{ env.TAG }}
          overwrite: true
          body: "Automatic iOS Release"
